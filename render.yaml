      - key: AUTH_LOGIN_RATE_LIMIT_MAX
        value: "5"
      - key: AUTH_LOGIN_RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: AUTH_PASSWORD_RESET_RATE_LIMIT_MAX
        value: "5"
      - key: AUTH_PASSWORD_RESET_RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: AUTH_EXPOSE_RESET_TOKEN_IN_RESPONSE
        value: "false"
      - key: LOG_LEVEL

services:
  - type: web
    name: ishraf-platform-backend-staging
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_NAME
        value: ishraf-platform-backend-staging
      - key: API_PREFIX
        value: /api/v1
      - key: PUBLIC_ROOT_URL
        value: https://ishraf-platform-backend-staging.onrender.com
      - key: PUBLIC_API_BASE_URL
        value: https://ishraf-platform-backend-staging.onrender.com/api/v1
      - key: DATABASE_SCHEMA
        value: public
      - key: ACCESS_TOKEN_TTL_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_TTL_DAYS
        value: "7"
      - key: PASSWORD_RESET_TOKEN_TTL_MINUTES
        value: "30"
      - key: TRUST_PROXY
        value: "true"
      - key: REQUEST_BODY_LIMIT
        value: 1mb
      - key: AUTH_LOGIN_RATE_LIMIT_MAX
        value: "5"
      - key: AUTH_LOGIN_RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: AUTH_PASSWORD_RESET_RATE_LIMIT_MAX
        value: "5"
      - key: AUTH_PASSWORD_RESET_RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: AUTH_EXPOSE_RESET_TOKEN_IN_RESPONSE
        value: "false"
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_MIGRATIONS
        sync: false
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
